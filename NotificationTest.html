<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeFit - اختبار الإشعارات اللحظية</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #eab308;
            --info: #3b82f6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 50px;
            padding: 20px;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-main);
        }

        .header p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .status.connected .status-dot {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        /* Toasts Container */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            width: 350px;
            pointer-events: none;
        }

        /* Toast Item */
        .toast {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            gap: 15px;
            align-items: flex-start;
            transform: translateX(-120%);
            animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }

        .toast::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .toast.type-1::before, .toast.type-info::before { background-color: var(--info); }
        .toast.type-2::before, .toast.type-success::before { background-color: var(--success); }
        .toast.type-3::before, .toast.type-warning::before { background-color: var(--warning); }
        .toast.type-4::before, .toast.type-error::before { background-color: var(--danger); }

        .toast-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .toast.type-1 .toast-icon { color: var(--info); }
        .toast.type-2 .toast-icon { color: var(--success); }
        .toast.type-3 .toast-icon { color: var(--warning); }
        .toast.type-4 .toast-icon { color: var(--danger); }

        .toast-content {
            flex-grow: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .toast-time {
            font-size: 11px;
            color: rgba(148, 163, 184, 0.5);
            margin-top: 8px;
            display: block;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .toast-close:hover {
            opacity: 1;
            color: var(--text-main);
        }

        @keyframes slideIn {
            to { transform: translateX(0); }
        }

        @keyframes slideOut {
            to { transform: translateX(-120%); opacity: 0; }
        }

        .toast.removing {
            animation: slideOut 0.4s ease forwards;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i class="fa-solid fa-bell"></i> اختبار الإشعارات اللحظية</h1>
                <p>قم بالاتصال بـ SignalR Hub لاستقبال الإشعارات</p>
            </div>

            <div class="form-group">
                <label for="hubUrl">رابط الـ Hub (Hub URL)</label>
                <input type="text" id="hubUrl" class="form-control" value="https://localhost:7198/notificationHub" placeholder="مثال: https://localhost:5001/notificationHub">
            </div>

            <div class="form-group">
                <label for="jwtToken">رمز التحقق (JWT Token) للـ Owner</label>
                <textarea id="jwtToken" class="form-control" rows="3" placeholder="ضع الـ Token هنا بدون كلمة Bearer"></textarea>
            </div>

            <button id="connectBtn" class="btn btn-primary" onclick="toggleConnection()">
                <i class="fa-solid fa-link"></i> اتصال
            </button>

            <div id="statusIndicator" class="status">
                <div class="status-dot"></div>
                <span id="statusText">غير متصل</span>
            </div>
        </div>
    </div>

    <!-- Container for toasts -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- SignalR Client Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        let connection = null;

        async function toggleConnection() {
            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                await connection.stop();
                return;
            }

            const url = document.getElementById('hubUrl').value.trim();
            const token = document.getElementById('jwtToken').value.trim();
            const btn = document.getElementById('connectBtn');
            const statusText = document.getElementById('statusText');
            const statusIndicator = document.getElementById('statusIndicator');

            if (!url) {
                showToast({ title: 'خطأ', message: 'يرجى إدخال رابط الـ Hub', notificationType: 4 });
                return;
            }

            // Setup SignalR connection
            connection = new signalR.HubConnectionBuilder()
                .withUrl(url, {
                    accessTokenFactory: () => token
                })
                .withAutomaticReconnect()
                .configureLogging(signalR.LogLevel.Information)
                .build();

            // Listen for notifications
            connection.on("ReceiveNotification", (notification) => {
                console.log("Notification received:", notification);
                showToast(notification);
            });

            // Connection events
            connection.onreconnecting(error => {
                updateStatus('جاري إعادة الاتصال...', false);
                btn.disabled = true;
            });

            connection.onreconnected(connectionId => {
                updateStatus('متصل', true);
                updateButton(true);
            });

            connection.onclose(error => {
                updateStatus('غير متصل', false);
                updateButton(false);
            });

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الاتصال...';
                
                await connection.start();
                
                updateStatus('متصل بنجاح!', true);
                updateButton(true);
                showToast({ title: 'نظام الإشعارات', message: 'تم الاتصال بسيرفر SignalR بنجاح. أنت الآن جاهز لاستقبال الإشعارات اللحظية.', notificationType: 2 });
            } catch (err) {
                console.error(err);
                updateStatus('فشل الاتصال', false);
                updateButton(false);
                showToast({ title: 'فشل الاتصال', message: err.toString(), notificationType: 4 });
            }
        }

        function updateStatus(text, isConnected) {
            const statusText = document.getElementById('statusText');
            const statusIndicator = document.getElementById('statusIndicator');
            statusText.innerText = text;
            if (isConnected) {
                statusIndicator.classList.add('connected');
            } else {
                statusIndicator.classList.remove('connected');
            }
        }

        function updateButton(isConnected) {
            const btn = document.getElementById('connectBtn');
            btn.disabled = false;
            if (isConnected) {
                btn.className = 'btn btn-danger';
                btn.innerHTML = '<i class="fa-solid fa-link-slash"></i> قطع الاتصال';
            } else {
                btn.className = 'btn btn-primary';
                btn.innerHTML = '<i class="fa-solid fa-link"></i> اتصال';
            }
        }

        function showToast(notification) {
            const container = document.getElementById('toastContainer');
            
            // Map type to icon and class
            let typeClass = 'type-1'; // Default Info
            let iconClass = 'fa-circle-info';
            
            // Handle both enum integer values or string names if sent
            const type = notification.notificationType?.toString().toLowerCase() || notification.type?.toString().toLowerCase();
            
            if (type === '2' || type === 'success') {
                typeClass = 'type-2';
                iconClass = 'fa-circle-check';
            } else if (type === '3' || type === 'warning') {
                typeClass = 'type-3';
                iconClass = 'fa-triangle-exclamation';
            } else if (type === '4' || type === 'error') {
                typeClass = 'type-4';
                iconClass = 'fa-circle-xmark';
            }

            const timeString = notification.createdAt 
                ? new Date(notification.createdAt).toLocaleTimeString('ar-EG') 
                : new Date().toLocaleTimeString('ar-EG');

            const toast = document.createElement('div');
            toast.className = `toast ${typeClass}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fa-solid ${iconClass}"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${escapeHtml(notification.title || 'إشعار جديد')}</div>
                    <div class="toast-message">${escapeHtml(notification.message || '')}</div>
                    <span class="toast-time">${timeString}</span>
                </div>
                <button class="toast-close" onclick="removeToast(this.parentElement)"><i class="fa-solid fa-xmark"></i></button>
            `;

            container.prepend(toast);

            // Auto remove after 8 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    removeToast(toast);
                }
            }, 8000);
        }

        function removeToast(toast) {
            toast.classList.add('removing');
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.parentElement.removeChild(toast);
                }
            }, 400); // Wait for animation to finish
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
