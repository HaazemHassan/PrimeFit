<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8; padding: 40px 0;">
        <tr>
            <td align="center">

                <table width="520" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:10px; overflow:hidden;">

                    <tr>
                        <td style="background:#0f172a; padding: 28px; text-align:center;">
                            <h1 style="margin:0; color:#ffffff; font-size:22px; font-weight:700;">
                                Prime Fit
                            </h1>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 40px 32px 32px 32px;">

                            <p style="margin:0 0 16px 0; font-size:16px; color:#111827;">
                                Hi <strong>{{Name}}</strong>,
                            </p>

                            <p style="margin:0 0 24px 0; font-size:15px; color:#4b5563; line-height:1.7;">
                                Use the verification code below to reset your password.
                                This code will expire in
                                <strong style="color:#111827;">{{Minutes}} minutes</strong>.
                            </p>

                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="padding: 10px 0 30px 0;">
                                        <div style="display:inline-block; background:#f1f5f9; border:1px solid #e5e7eb; border-radius:10px; padding:18px 32px;">
                                            <span style="font-size:30px; font-weight:700; letter-spacing:10px; color:#2563eb; font-family:'Courier New', monospace;">
                                                {{Code}}
                                            </span>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin:0; font-size:13px; color:#9ca3af; line-height:1.6;">
                                If you didn’t request this, you can safely ignore this email.
                            </p>

                        </td>
                    </tr>

                    <tr>
                        <td style="padding: 20px 32px 28px 32px; text-align:center;">

                            <p style="margin:0; font-size:12px; color:#9ca3af;">
                                © 2026 Prime Fit
                            </p>

                            <p style="margin:4px 0 0 0; font-size:11px; color:#c7c9cc;">
                                This is an automated message
                            </p>

                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
